appId: com.photoshoot.app
productName: Photoshoot
copyright: Copyright © 2026 Photoshoot
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - package.json
  - "!**/*.map"
asar: true
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build/icon.png
  artifactName: ${productName}-${version}-${arch}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Photoshoot
portable:
  artifactName: ${productName}-${version}-portable.${ext}
